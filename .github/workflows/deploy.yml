name: Deploy

on:
  push:
    branches: [development, staging, main]
  pull_request:
    branches: [development, staging, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - id: resolve
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          case "$BRANCH" in
            main) echo "environment=production" >> "$GITHUB_OUTPUT" ;;
            staging) echo "environment=staging" >> "$GITHUB_OUTPUT" ;;
            development) echo "environment=development" >> "$GITHUB_OUTPUT" ;;
            *) echo "environment=development" >> "$GITHUB_OUTPUT" ;;
          esac

  ci-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  deploy:
    needs: [resolve-env, ci-gate]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Deploy to Cloudflare
        env:
          DEPLOY_ENV: ${{ needs.resolve-env.outputs.environment }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            pnpm wrangler deploy
          else
            pnpm wrangler deploy --env "$DEPLOY_ENV"
          fi
